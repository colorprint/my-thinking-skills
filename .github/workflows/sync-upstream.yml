name: Sync ngmeyer-skills from upstream

on:
  schedule:
    - cron: "17 6 * * *"   # daily ~06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone upstream
        run: git clone --depth 1 https://github.com/ngmeyer/skills upstream

      - name: Mirror skills + manifest (without pinning version)
        run: |
          rsync -a --delete upstream/skills/ plugins/ngmeyer-skills/skills/
          # copy upstream plugin.json but DROP "version" so updates track the git commit, not a pinned string
          python3 - <<'PY'
          import json
          d = json.load(open("upstream/.claude-plugin/plugin.json"))
          d.pop("version", None)
          json.dump(d, open("plugins/ngmeyer-skills/.claude-plugin/plugin.json","w"), indent=2)
          PY
          cp -f upstream/LICENSE plugins/ngmeyer-skills/LICENSE || true
          rm -rf upstream

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: sync ngmeyer-skills from upstream@main"
            git push
          else
            echo "Already up to date with upstream."
          fi
